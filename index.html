<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>NexusForge</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0a0f1c;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    header {
      background: #111827;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid #1e2937;
    }
    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: #60a5fa;
      cursor: pointer;
    }
    input {
      flex: 1;
      padding: 12px;
      border-radius: 9999px;
      border: none;
      background: #1e2937;
      color: white;
    }
    button {
      padding: 10px 18px;
      background: #60a5fa;
      border: none;
      border-radius: 9999px;
      cursor: pointer;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .tab-bar {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      background: #111827;
      border-bottom: 1px solid #1e2937;
      overflow-x: auto;
    }
    .tab {
      padding: 8px 14px;
      background: #1e2937;
      border-radius: 9999px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .tab.active {
      background: #60a5fa;
      color: #0a0f1c;
    }
    iframe {
      flex: 1;
      border: none;
      background: white;
    }
  </style>
</head>
<body>

<header>
  <div class="logo" onclick="location.reload()">NexusForge</div>
  <input
    id="urlInput"
    placeholder="Enter URL"
    onkeypress="if(event.key==='Enter')addTab(document.getElementById('urlInput').value)"
  />
  <button onclick="addTab(document.getElementById('urlInput').value)">Go</button>
</header>

<!-- Add a button to launch with about:blank -->
<div style="padding: 10px; text-align: center;">
  <button onclick="launchWithAboutBlank('https://example.com')">Launch Example.com</button>
</div>

<div class="main">
  <div class="tab-bar" id="tabBar"></div>
  <iframe id="mainFrame"></iframe>
</div>

<!-- ================= FIREBASE + APP LOGIC ================= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDUeTtZP09-PiNHg3UlKGMNtMqBGTrxXGo",
  authDomain: "nexus-4cfe5.firebaseapp.com",
  projectId: "nexus-4cfe5",
  storageBucket: "nexus-4cfe5.firebasestorage.app",
  messagingSenderId: "96048174084",
  appId: "1:96048174084:web:4b90ac6a5f73f914a65151",
  measurementId: "G-E82XDN839Q"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// State
let tabs = [];
let current = 0;

// Save to cloud
async function saveTabsCloud() {
  await setDoc(doc(db, "nexus", "tabs"), { tabs, current });
}

// Load from cloud
async function loadTabsCloud() {
  const snap = await getDoc(doc(db, "nexus", "tabs"));
  if (snap.exists()) {
    const data = snap.data();
    tabs = data.tabs || [];
    current = data.current || 0;
  } else {
    tabs = [{ url: "https://google.com", title: "google.com" }];
    current = 0;
  }
  renderTabs();
  loadCurrent();
}

// Add tab
function addTab(url) {
  try {
    if (!url.startsWith("http")) url = "https://" + url;
    const u = new URL(url);
    tabs.push({ url: u.href, title: u.hostname.replace("www.", "") });
    current = tabs.length - 1;
    saveTabsCloud();
    renderTabs();
    loadCurrent();
  } catch {
    alert("Invalid URL");
  }
}

// Switch tab
function switchTab(i) {
  current = i;
  saveTabsCloud();
  loadCurrent();
  renderTabs();
}

// Close tab
function closeTab(i) {
  if (tabs.length <= 1) return;
  tabs.splice(i, 1);
  if (current >= tabs.length) current = tabs.length - 1;
  saveTabsCloud();
  renderTabs();
  loadCurrent();
}

// Load current tab
function loadCurrent() {
  const frame = document.getElementById("mainFrame");
  if (!tabs.length) {
    frame.src = "https://google.com";
    return;
  }
  frame.src = tabs[current].url;
}

// Render tabs
function renderTabs() {
  const bar = document.getElementById("tabBar");
  bar.innerHTML = "";
  tabs.forEach((t, i) => {
    const el = document.createElement("div");
    el.className = `tab ${i === current ? "active" : ""}`;
    el.innerHTML = `
      ${t.title}
      <span onclick="event.stopPropagation();window.closeTab(${i})" style="color:#999;margin-left:8px;">×</span>
    `;
    el.onclick = () => window.switchTab(i);
    bar.appendChild(el);
  });
}

// =================== Your new function ===================
function launchWithAboutBlank(url) {
  const newTab = window.open("about:blank", "_blank", "noopener,noreferrer");
  if (newTab) {
    setTimeout(() => {
      newTab.location.href = url;
    }, 50);
  } else {
    alert("Popup blocked! Please allow popups for this site.");
  }
}

// Initialize
window.onload = () => {
  loadTabsCloud();
};
</script>

</body>
</html>
